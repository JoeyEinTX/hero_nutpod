device:
  name: Hero
  type: NutPod

cameras:
  nestcam:
    port: 0
    role: interior
  crittercam:
    port: 1
    role: exterior

capture:
  snapshot:
    format: jpeg
    resolution: [4608, 2592]
  clip:
    resolution: [2304, 1296]
    framerate: 15
    pre_roll_seconds: 5
    post_roll_seconds: 10
  motion_sampling:
    resolution: [1536, 864]
    framerate: 15
  awb_mode: daylight

heartbeat:
  interval_minutes: 15

motion:
  sensitivity_preset: medium
  pixel_threshold: 25
  area_threshold_percent: 2.0
  cooldown_seconds: 30

retention:
  clips_days: 7
  snapshots_days: 7
  heartbeats_days: 30
  logs_days: null      # null = never delete
  db_rows_days: null   # null = never delete

paths:
  snapshots: output/snapshots
  clips: output/clips
  database: output/nutflix.db
  logs: logs
  keepers_subdir: keepers
  preview: output/preview

dashboard:
  host: 0.0.0.0
  port: 8080
  preview_refresh_seconds: 2
  events_per_page: 50

sensors:
  bme280:
    enabled: true
    i2c_address: 0x76
    poll_interval_seconds: 300

ir_emitter:
  enabled: true
  brightness_threshold: 50
  threshold_smoothing_seconds: 30
  cameras:
    nestcam:
      gpio_pin: 17
    crittercam:
      gpio_pin: 27
